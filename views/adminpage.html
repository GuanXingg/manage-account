<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Admin Homepage</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
		/>
		<link rel="stylesheet" href="../css/resources.css" />
		<link rel="stylesheet" href="../css/reset.css" />
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<div class="wrapper">
			<section class="homepage">
				<section class="homepage-info">
					<h1 class="homepage__title">Personal info</h1>
					<div class="homepage__box">
						<table class="homepage-info__table">
							<tbody>
								<tr>
									<th>Email:</th>
									<td colspan="2" id="info-email"></td>
								</tr>
								<tr>
									<th>Password:</th>
									<td>
										<input
											type="password"
											name="info-pass"
											value=""
											disabled
											id="info-pass"
											class="homepage-info__pass"
										/>
									</td>
									<td><button class="homepage-info__btn">Show</button></td>
								</tr>
								<tr>
									<th>Name:</th>
									<td colspan="2" id="info-name"></td>
								</tr>
								<tr>
									<th>Age:</th>
									<td colspan="2" id="info-age"></td>
								</tr>
							</tbody>
						</table>
					</div>
				</section>

				<section class="homepage-show">
					<div class="homepage__box">
						<table class="homepage-show__table">
							<thead>
								<tr>
									<th>Or.</th>
									<th>Name</th>
									<th>Age</th>
									<th>Email</th>
									<th>Password</th>
									<th>Created date</th>
									<th></th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</section>

				<button class="homepage__logout">Log out</button>
			</section>
		</div>

		<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
		<!-- <script src="../js/homepage.js"></script> -->
		<script src="../js/admin.js"></script>
	</body>
</html>
